server {
  listen 80;
  server_name _;

  # Allow up to 5MB uploads (backend limit) with a little headroom
  client_max_body_size 6m;

  # Serve static assets and React SPA
  root /usr/share/nginx/html;
  index index.html;

  # SPA routing
  location / {
    try_files $uri $uri/ /index.html;
  }

  # API proxy — $BACKEND_URL is substituted at container start via envsubst
  location /translate {
    proxy_pass $BACKEND_URL;
    proxy_set_header Host $proxy_host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /upload {
    proxy_pass $BACKEND_URL;
    proxy_set_header Host $proxy_host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /history {
    proxy_pass $BACKEND_URL;
    proxy_set_header Host $proxy_host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /ping {
    proxy_pass $BACKEND_URL;
    proxy_set_header Host $proxy_host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # Security headers
  add_header X-Content-Type-Options "nosniff";
  add_header X-Frame-Options "DENY";
  add_header X-XSS-Protection "1; mode=block";
  add_header Referrer-Policy "strict-origin-when-cross-origin";

  # Gzip compression
  gzip on;
  gzip_types text/plain text/css application/javascript application/json application/xml+rss image/svg+xml;
}

